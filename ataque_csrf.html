<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Formulario Seguro CSRF</title>
</head>

<body>

    <h1>Formulario Seguro</h1>

    <form method="POST" action="/formulario">

        <!-- Token CSRF -->
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>Nombre</label>

        <br>

        <input
            type="text"
            name="nombre"
            required>

        <br><br>

        <label>Mensaje</label>

        <br>

        <input
            type="text"
            name="mensaje"
            required>

        <br><br>

        <button type="submit">

            Enviar

        </button>

    </form>

    <hr>

    {% if resultado %}

    <h3>Resultado</h3>

    <p>{{ resultado }}</p>

    {% endif %}

</body>

</html>
